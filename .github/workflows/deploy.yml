name: Deploy Sewasiswa to Server

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            
            if [ "${{ github.ref }}" == "refs/heads/main" ]; then
              DEPLOY_DIR="/home/${{ secrets.VPS_USER }}/alyarmin-prod/sewasiswa"
              BRANCH="main"
            else
              DEPLOY_DIR="/home/${{ secrets.VPS_USER }}/alyarmin-dev/sewasiswa"
              BRANCH="dev"
            fi

            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR" || exit 1

            if [ ! -d .git ]; then
              git clone -b $BRANCH https://${{ secrets.GIT_TOKEN }}@github.com/alyarmin/sewasiswa.git .
            else
              git config --global --add safe.directory "$DEPLOY_DIR"
              git fetch origin
              git reset --hard origin/$BRANCH
            fi

            # Create .env file from GitHub Secrets
            cat <<EOF > .env
            VPS_HOST=${{ secrets.VPS_HOST_DB }}
            VPS_USERNAME_DB=${{ secrets.VPS_USERNAME_DB }}
            VPS_PASS_DB=${{ secrets.VPS_PASS_DB }}
            VPS_NAME_DB=${{ secrets.VPS_NAME_DB }}
            GIT_TOKEN=${{ secrets.GIT_TOKEN }}
            GERMINI_API={{ secrets.GERMINI_API }}
            EOF

            # Optional permissions (safe for PHP projects)
            chmod 644 .env || true